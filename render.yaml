# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect github.com/jmwilson92/writeflow-ai

services:
  - type: web
    name: writeflow
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOW_DEMO_CHECKOUT
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: IP_HASH_SALT
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        value: hello@sparknous.com
      # Stripe — set values in Render dashboard only (sync: false = blueprint won't wipe them)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_LINK_PRO
        sync: false
      - key: STRIPE_LINK_PRO_ANNUAL
        sync: false
      - key: STRIPE_LINK_BUSINESS
        sync: false
      - key: STRIPE_LINK_BUSINESS_ANNUAL
        sync: false
      - key: STRIPE_LINK_PACK_50
        sync: false
      - key: STRIPE_LINK_PACK_200
        sync: false
      - key: STRIPE_LINK_PACK_500
        sync: false
      - key: STRIPE_LINK_PACK_1000
        sync: false
      # Optional — leave unset; Render URL is auto-allowed via RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        sync: false