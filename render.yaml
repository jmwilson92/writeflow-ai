# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect github.com/jmwilson92/writeflow-ai

services:
  - type: web
    name: writeflow
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm rebuild better-sqlite3
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOW_DEMO_CHECKOUT
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: IP_HASH_SALT
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        value: hello@writeflow.ai
      # Stripe — add these in Render dashboard after deploy (can be empty at first)
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
      - key: STRIPE_LINK_PRO
        value: ""
      - key: STRIPE_LINK_PRO_ANNUAL
        value: ""
      - key: STRIPE_LINK_BUSINESS
        value: ""
      - key: STRIPE_LINK_BUSINESS_ANNUAL
        value: ""
      - key: STRIPE_LINK_PACK_50
        value: ""
      - key: STRIPE_LINK_PACK_200
        value: ""
      - key: STRIPE_LINK_PACK_500
        value: ""
      - key: STRIPE_LINK_PACK_1000
        value: ""
      - key: ALLOWED_ORIGINS
        value: ""